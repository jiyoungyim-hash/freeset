<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>La Rosée — Visual Freeset</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2107@1.1/Suit-Regular.woff2');
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

/* SUIT 한글 */
@font-face {
  font-family: 'SUIT';
  src: url('https://cdn.jsdelivr.net/gh/webfontworld/sunn/SUIT-Regular.woff2') format('woff2');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'SUIT';
  src: url('https://cdn.jsdelivr.net/gh/webfontworld/sunn/SUIT-Medium.woff2') format('woff2');
  font-weight: 500; font-style: normal;
}
@font-face {
  font-family: 'SUIT';
  src: url('https://cdn.jsdelivr.net/gh/webfontworld/sunn/SUIT-SemiBold.woff2') format('woff2');
  font-weight: 600; font-style: normal;
}

:root {
  --ivory: #FAF8F5;
  --stone: #F2EDE8;
  --rose: #66C7EF;
  --rose-deep: #009CDE;
  --blue: #009CDE;
  --blue-light: #E8F6FD;
  --ink: #1C1C1E;
  --muted: #8E8E93;
  --border: rgba(28,28,30,0.1);
  --border-strong: rgba(28,28,30,0.18);
  --white: #FFFFFF;
  --radius: 12px;
  --radius-lg: 18px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font-en: 'Libre Baskerville', 'Chaparral Pro', Georgia, serif;
  --font-kr: 'SUIT', 'Apple SD Gothic Neo', system-ui, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--ivory);
  color: var(--ink);
  font-family: 'SUIT', 'Apple SD Gothic Neo', system-ui, sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

/* ── 헤더 ── */
.header {
  padding: calc(var(--safe-top) + 16px) 24px 16px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.brand-name {
  display: none;
  font-family: var(--font-en);
  font-size: 20px;
  font-weight: 300;
  letter-spacing: 2px;
  color: var(--ink);
  line-height: 1;
}
.brand-name em {
  font-style: italic;
  color: var(--rose-deep);
}

.brand-logo {
  height: 40px;
  width: auto;
  display: block;
  object-fit: contain;
}
.header-badge {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  color: var(--blue);
  background: var(--blue-light);
  padding: 4px 10px;
  border-radius: 20px;
}

/* ── 탭 ── */
.tabs {
  display: flex;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 72px;
  z-index: 99;
  padding: 0 24px;
  gap: 0;
}
.tab {
  flex: 1;
  padding: 15px 0;
  font-size: 21px;
  font-weight: 600;
  letter-spacing: 0.2px;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 2.5px solid transparent;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.tab.active { color: var(--rose-deep); border-bottom-color: var(--rose-deep); }

/* ── 패널 ── */
.panel { display: none; flex: 1; flex-direction: column; }
.panel.active { display: flex; }

/* ══ 패널 1: 업로드 ══ */
.upload-panel { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

.upload-zone {
  border: 1.5px dashed var(--rose);
  border-radius: var(--radius-lg);
  padding: 44px 24px;
  text-align: center;
  background: var(--white);
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
}
.upload-zone.has-image { padding: 0; border-style: solid; overflow: hidden; }
.upload-zone.has-image input { pointer-events: none; }
.upload-zone:active, .upload-zone.dragover { border-color: var(--rose-deep); background: #E8F6FD; }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.6; }
.upload-title {
  font-family: var(--font-en);
  font-size: 30px;
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.upload-hint { font-size: 18px; color: var(--muted); line-height: 1.6; }

.preview-img { width: 100%; max-height: 220px; object-fit: cover; display: block; }
.preview-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
  background: var(--stone);
}
.preview-meta { font-size: 16px; color: var(--muted); }
.remove-btn {
  font-size: 18px; font-weight: 600; color: #fff;
  background: var(--rose-deep); border: none;
  padding: 6px 14px; border-radius: 20px;
  font-family: inherit; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: background 0.15s;
}
.remove-btn:active { background: #0080b8; }

/* ── 설정 카드 ── */
.setting-block {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}
.setting-head {
  font-size: 13px; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  padding: 14px 16px 10px;
}
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 16px 14px; }
.chip {
  padding: 7px 14px; border-radius: 20px; font-size: 18px;
  border: 1px solid var(--border-strong); background: transparent; color: var(--muted);
  font-family: inherit; cursor: pointer; transition: all 0.15s; font-weight: 400;
}
.chip.active { background: var(--rose-deep); border-color: var(--rose-deep); color: #fff; }

.crop-rows { display: flex; flex-direction: column; }
.crop-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; border-top: 1px solid var(--border);
  cursor: pointer;
}
.crop-row:first-child { border-top: none; }
.crop-row input { accent-color: var(--rose-deep); }
.crop-label { font-size: 20px; }
.crop-desc { font-size: 16px; color: var(--muted); margin-top: 1px; }

/* ══ 패널 2: 채널 선택 ══ */
.channel-panel { display: flex; flex-direction: column; flex: 1; }

.ch-scroll {
  display: flex; gap: 8px;
  padding: 14px 24px;
  overflow-x: auto; scrollbar-width: none;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.ch-scroll::-webkit-scrollbar { display: none; }
.ch-pill {
  padding: 9px 18px; border-radius: 20px; font-size: 21px; font-weight: 500;
  white-space: nowrap; border: 1px solid var(--border-strong);
  background: transparent; color: var(--muted); font-family: inherit;
  cursor: pointer; flex-shrink: 0; letter-spacing: 0.3px; transition: all 0.15s;
}
.ch-pill.active { background: var(--blue); border-color: var(--blue); color: #fff; }

.sel-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 24px; font-size: 16px; color: var(--muted); flex-shrink: 0;
}
.sel-actions { display: flex; gap: 8px; }
.sel-btn {
  font-size: 16px; padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border-strong); background: transparent;
  color: var(--muted); font-family: inherit; cursor: pointer;
}

.preset-list { flex: 1; overflow-y: auto; padding: 0 24px 24px; }

/* 채널 그룹 */
.ch-group { margin-bottom: 20px; }
.ch-group-title {
  font-size: 13px; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  padding: 16px 0 8px;
  display: flex; align-items: center; gap: 8px;
}
.ch-group-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.ch-group-items { display: flex; flex-direction: column; gap: 6px; }

.preset-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--white);
  cursor: pointer; transition: all 0.15s;
}
.preset-item.selected {
  border-color: var(--rose-deep);
  background: #E8F6FD;
}
.preset-item:active { transform: scale(0.99); }
.preset-item input { accent-color: var(--rose-deep); width: 15px; height: 15px; }
.preset-icon { font-size: 16px; }
.preset-info { flex: 1; }
.preset-name { font-size: 20px; font-weight: 500; }
.preset-dim { font-size: 16px; color: var(--muted); margin-top: 1px; font-variant-numeric: tabular-nums; }
.preset-ratio {
  font-size: 15px; padding: 2px 7px; border-radius: 4px;
  background: var(--stone); color: var(--muted); font-weight: 500;
}

/* ══ 패널 3: 미리보기 ══ */
.preview-panel-wrap { flex: 1; overflow-y: auto; padding: 20px 24px; }

.preview-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 50vh; gap: 12px; color: var(--muted); text-align: center;
}
.preview-empty-icon { font-size: 40px; opacity: 0.25; }
.preview-empty-title {
  font-family: var(--font-en);
  font-size: 22px; font-weight: 300; color: var(--ink); opacity: 0.4;
}
.preview-empty-hint { font-size: 18px; line-height: 1.7; max-width: 200px; }

.preview-section-title {
  font-size: 13px; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  padding: 20px 0 10px;
  display: flex; align-items: center; gap: 8px;
}
.preview-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.pv-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all 0.2s;
}
.pv-card:hover { border-color: var(--rose); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.pv-card:active { border-color: var(--rose-deep); }

.pv-canvas-wrap {
  background: #f5f5f5;
  height: 150px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}
.pv-canvas-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-conic-gradient(#e8e8e8 0% 25%, #f5f5f5 0% 50%) 0 0 / 16px 16px;
  z-index: 0;
}
.pv-canvas-wrap canvas {
  max-width: 100%; max-height: 100%;
  display: block; position: relative; z-index: 1;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}

.pv-body { padding: 12px; }
.pv-ch {
  font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--rose-deep); font-weight: 600; margin-bottom: 3px;
}
.pv-name {
  font-size: 18px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.pv-dim { font-size: 15px; color: var(--muted); font-variant-numeric: tabular-nums; }
.pv-dl {
  width: 100%; margin-top: 10px; padding: 8px;
  border-radius: 8px; border: 1px solid var(--border-strong);
  background: transparent; color: var(--ink);
  font-size: 16px; font-weight: 500; font-family: inherit; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.2px;
}
.pv-dl:active { background: var(--rose-deep); border-color: var(--rose-deep); color: #fff; }

/* ── 하단 액션바 ── */
.action-bar {
  display: none;
  padding: 14px 24px calc(var(--safe-bottom) + 14px);
  background: var(--white);
  border-top: 1px solid var(--border);
  align-items: center;
  gap: 12px;
}
.action-bar.visible { display: flex; }
.action-info { flex: 1; }
.action-count { font-size: 20px; font-weight: 500; }
.action-count span { color: var(--rose-deep); }
.action-hint { font-size: 15px; color: var(--muted); margin-top: 1px; }
.btn-export {
  padding: 13px 22px; border-radius: var(--radius); border: none;
  background: var(--ink); color: #fff;
  font-size: 20px; font-weight: 500; font-family: inherit; cursor: pointer;
  white-space: nowrap; letter-spacing: 0.3px;
}
.btn-export:active { background: var(--rose-deep); transform: scale(0.98); }

/* ── 토스트 ── */
.toast {
  position: fixed; bottom: calc(var(--safe-bottom) + 90px); left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--ink); color: #fff;
  padding: 10px 20px; border-radius: 30px;
  font-size: 12px; font-weight: 500; letter-spacing: 0.3px;
  white-space: nowrap; opacity: 0;
  transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 200; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ 커스터마이징 시트 (전체화면 분할) ══ */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 300;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.sheet-overlay.open { opacity: 1; pointer-events: all; }

.custom-sheet {
  position: fixed; inset: 0;
  background: var(--ivory);
  z-index: 301;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
  display: flex; flex-direction: column;
}
.custom-sheet.open { transform: translateY(0); }

.sheet-header {
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: var(--white);
  border-bottom: 1px solid var(--border);
}
.sheet-title {
  font-family: var(--font-en);
  font-size: 18px; font-weight: 300; letter-spacing: 0.5px;
}
.sheet-close {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--stone); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: var(--muted);
}

/* ── 분할 레이아웃 ── */
.sheet-split {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
@media (min-width: 640px) {
  .sheet-split { flex-direction: row; }
}

/* 미리보기 패널 (위쪽 / 왼쪽) */
.sheet-preview-pane {
  flex-shrink: 0;
  height: 42vh;
  background: #efefef;
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}
@media (min-width: 640px) {
  .sheet-preview-pane {
    height: auto; width: 50%;
    border-right: 1px solid var(--border);
  }
}
.sheet-preview-pane::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-conic-gradient(#e0e0e0 0% 25%, #efefef 0% 50%) 0 0 / 16px 16px;
  pointer-events: none;
}
.sheet-canvas-center {
  flex: 1; display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
  padding: 16px;
}
.sheet-canvas-center canvas {
  max-width: 100%; max-height: 100%;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  display: block;
}
.custom-preview-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: rgba(242,237,232,0.95);
  backdrop-filter: blur(8px);
  flex-shrink: 0; position: relative; z-index: 1;
}
.custom-preset-name { font-size: 12px; font-weight: 500; }
.custom-preset-dim { font-size: 10px; color: var(--muted); }
.nav-btns { display: flex; gap: 6px; }
.nav-btn {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1px solid var(--border-strong); background: var(--white);
  cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center;
}
.nav-btn:active { background: var(--stone); }
.nav-counter { font-size: 11px; color: var(--muted); align-self: center; }

/* 컨트롤 패널 (아래쪽 / 오른쪽) */
.sheet-controls-pane {
  flex: 1; overflow-y: auto;
  padding: 16px 20px;
  display: flex; flex-direction: column; gap: 16px;
}

/* 컨트롤 섹션 */
.ctrl-section { display: flex; flex-direction: column; gap: 12px; }
.ctrl-label {
  font-size: 9px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
}
.ctrl-sub-label {
  font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted);
  margin-top: 4px;
}
.ctrl-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 12px;
}

/* 위치 그리드 */
.pos-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 6px; width: 120px; margin: 0 auto;
}
.pos-btn {
  aspect-ratio: 1; border-radius: 8px;
  border: 1px solid var(--border-strong);
  background: var(--stone); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.15s;
}
.pos-btn.active { background: var(--rose-deep); border-color: var(--rose-deep); }
.pos-btn:active { transform: scale(0.92); }

/* 슬라이더 */
.slider-row { display: flex; align-items: center; gap: 10px; }
.slider-row label { font-size: 12px; color: var(--ink); min-width: 48px; }
.slider-row input[type=range] {
  flex: 1; height: 4px; accent-color: var(--rose-deep);
  cursor: pointer;
}
.slider-val {
  font-size: 11px; color: var(--muted);
  min-width: 36px; text-align: right;
  font-variant-numeric: tabular-nums;
}

/* 배경색 */
.bg-color-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.color-swatch {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: all 0.15s; flex-shrink: 0;
}
.color-swatch.active { border-color: var(--ink); transform: scale(1.15); }
.color-custom {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1.5px dashed var(--border-strong); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--muted); overflow: hidden;
}
.color-custom input { opacity: 0; position: absolute; width: 0; height: 0; }

/* 텍스트/워터마크 */
.text-input-wrap { position: relative; }
.text-input-wrap input[type=text] {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--border-strong); border-radius: 8px;
  font-family: inherit; font-size: 13px; background: var(--ivory);
  color: var(--ink); outline: none;
}
.text-input-wrap input:focus { border-color: var(--rose-deep); }

.text-pos-row { display: flex; gap: 6px; flex-wrap: wrap; }
.text-pos-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 11px;
  border: 1px solid var(--border-strong); background: transparent;
  color: var(--muted); font-family: inherit; cursor: pointer;
}
.text-pos-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; }

.opacity-row { display: flex; align-items: center; gap: 8px; }

/* 적용 범위 토글 */
.scope-row { display: flex; gap: 8px; margin-top: 4px; }
.scope-btn {
  flex: 1; padding: 8px; border-radius: 8px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--border-strong); background: transparent;
  color: var(--muted); font-family: inherit; cursor: pointer; text-align: center;
}
.scope-btn.active { background: var(--rose-deep); border-color: var(--rose-deep); color: #fff; }


.btn-reset {
  padding: 13px 18px; border-radius: var(--radius);
  border: 1px solid var(--border-strong); background: transparent;
  color: var(--muted); font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer; white-space: nowrap;
}
.btn-confirm {
  flex: 1; padding: 13px; border-radius: var(--radius);
  border: none; background: var(--ink); color: #fff;
  font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer;
}
.btn-confirm:active { background: var(--rose-deep); transform: scale(0.98); }

/* ── 폰트 역할 분리 ── */
.header-badge,
.ctrl-label,
.preview-section-title,
.pv-ch,
.ch-group-title,
.setting-head {
  font-family: var(--font-kr);
  letter-spacing: 1.5px;
}

/* 영문 강조 텍스트 */
.sheet-title,
.upload-title,
.preview-empty-title {
  font-family: var(--font-en);
}

/* 국문 본문 */
.pv-name,

.tab,
.nav-counter,
.custom-preset-name {

<!-- 탭 -->
<nav class="tabs">
  <button class="tab active" data-tab="upload">비주얼</button>
  <button class="tab" data-tab="channel">채널 선택</button>
  <button class="tab" data-tab="preview">내보내기</button>
</nav>

<!-- ══ 탭 1: 비주얼 업로드 ══ -->
<div class="panel active" id="tab-upload">
  <div class="upload-panel">

    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept="image/*">
      <div id="uploadPlaceholder">
        <div class="upload-title">Upload Key Visual</div>
        <div class="upload-hint">JPG · PNG · WEBP<br>Drag or tap to select</div>
      </div>
      <div id="uploadPreview" style="display:none;">
        <img id="previewImg" class="preview-img" src="" alt="">
        <div class="preview-bar">
          <span class="preview-meta" id="previewMeta"></span>
          <button class="remove-btn" id="removeBtn">Remove Image</button>
        </div>
      </div>
    </div>

    <!-- 출력 포맷 -->
    <div class="setting-block">
      <div class="setting-head">출력 포맷</div>
      <div class="chip-row">
        <button class="chip active" data-fmt="jpeg">JPG</button>
        <button class="chip" data-fmt="png">PNG</button>
        <button class="chip" data-fmt="webp">WEBP</button>
        <button class="chip" data-fmt="pop_a3">POP A3</button>
      </div>
    </div>

    <!-- 여백 처리 방식 -->
    <div class="setting-block">
      <div class="setting-head">비율 변환 방식</div>
      <div class="crop-rows">
        <label class="crop-row">
          <input type="radio" name="crop" value="contain" checked>
          <div>
            <div class="crop-label">이미지 보존 <span style="font-size:10px;color:var(--rose-deep);font-weight:500;">권장</span></div>
            <div class="crop-desc">이미지 전체 보존, 여백은 배경색으로 자연스럽게 채움</div>
          </div>
        </label>
        <label class="crop-row">
          <input type="radio" name="crop" value="stretch">
          <div>
            <div class="crop-label">늘리기</div>
            <div class="crop-desc">이미지를 프레임에 맞게 늘림 (비율 변형)</div>
          </div>
        </label>
      </div>
    </div>

  </div>
</div>

<!-- ══ 탭 2: 채널 선택 ══ -->
<div class="panel" id="tab-channel">
  <div class="channel-panel">
    <div class="ch-scroll" id="chScroll">
      <button class="ch-pill active" data-ch="all">전체</button>
      <button class="ch-pill" data-ch="web">공식홈페이지</button>
      <button class="ch-pill" data-ch="online">브랜드스토어</button>
      <button class="ch-pill" data-ch="offline">오프라인</button>
      <button class="ch-pill" data-ch="sns">SNS</button>
      <button class="ch-pill" data-ch="ad">광고매체</button>
    </div>
    <div class="sel-bar">
      <span id="selCount">0개 선택</span>
      <div class="sel-actions">
        <button class="sel-btn" id="selAll">전체 선택</button>
        <button class="sel-btn" id="deselAll">해제</button>
      </div>
    </div>
    <div class="preset-list" id="presetList"></div>
  </div>
</div>

<!-- ══ 탭 3: 미리보기/내보내기 ══ -->
<div class="panel" id="tab-preview">
  <div class="preview-panel-wrap">
    <div class="preview-empty" id="previewEmpty">
      <div class="preview-empty-icon">✦</div>
      <div class="preview-empty-title">아직 선택이 없어요</div>
      <div class="preview-empty-hint">비주얼을 올리고 채널을 선택하면 여기에 표시돼요</div>
    </div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>
</div>

<!-- 하단 액션바 -->
<div class="action-bar" id="actionBar">
  <div class="action-info">
    <div class="action-count"><span id="actionCount">0</span>개 채널 준비됨</div>
    <div class="action-hint">탭해서 전체 다운로드</div>
  </div>
  <button class="btn-export" id="exportBtn">⬇ 내보내기</button>
</div>


<!-- ══ 커스터마이징 바텀시트 ══ -->
<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="custom-sheet" id="customSheet">
  <div class="sheet-header">
    <div class="sheet-title">내보내기 설정</div>
    <button class="sheet-close" id="sheetClose">✕</button>
  </div>

  <div class="sheet-split">

    <!-- ── 미리보기 패널 ── -->
    <div class="sheet-preview-pane">
      <div class="sheet-canvas-center">
        <canvas id="customCanvas"></canvas>
      </div>
      <div class="custom-preview-nav">
        <div>
          <div class="custom-preset-name" id="customPresetName">—</div>
          <div class="custom-preset-dim" id="customPresetDim">—</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="nav-counter" id="navCounter">1 / 1</span>
          <div class="nav-btns">
            <button class="nav-btn" id="navPrev">‹</button>
            <button class="nav-btn" id="navNext">›</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 컨트롤 패널 ── -->
    <div class="sheet-controls-pane">

      <!-- 위치 조정 -->
      <div class="ctrl-section">
        <div class="ctrl-label">이미지 위치</div>
        <div class="ctrl-card">
          <div class="pos-grid" id="posGrid">
            <button class="pos-btn" data-pos="tl">↖</button>
            <button class="pos-btn" data-pos="tc">↑</button>
            <button class="pos-btn" data-pos="tr">↗</button>
            <button class="pos-btn" data-pos="ml">←</button>
            <button class="pos-btn active" data-pos="mc">·</button>
            <button class="pos-btn" data-pos="mr">→</button>
            <button class="pos-btn" data-pos="bl">↙</button>
            <button class="pos-btn" data-pos="bc">↓</button>
            <button class="pos-btn" data-pos="br">↘</button>
          </div>
        </div>
      </div>

      <!-- 배경색 -->
      <div class="ctrl-section">
        <div class="ctrl-label">여백 배경색</div>
        <div class="ctrl-card">
          <div class="bg-color-row" id="bgColorRow">
            <div class="color-swatch active" data-color="auto" style="background:linear-gradient(135deg,#f9f5f0,#d4c4bc);" title="자동(엣지색)"></div>
            <div class="color-swatch" data-color="#FFFFFF" style="background:#FFFFFF;border:1px solid #eee;"></div>
            <div class="color-swatch" data-color="#000000" style="background:#000000;"></div>
            <div class="color-swatch" data-color="#FAF8F5" style="background:#FAF8F5;border:1px solid #eee;"></div>
            <div class="color-swatch" data-color="#F2EDE8" style="background:#F2EDE8;border:1px solid #eee;"></div>
            <div class="color-swatch" data-color="#009CDE" style="background:#009CDE;"></div>
            <div class="color-swatch" data-color="#C8A49A" style="background:#C8A49A;"></div>
            <div class="color-custom" title="직접 선택">
              🎨<input type="color" id="customBgColor" value="#ffffff">
            </div>
          </div>
        </div>
      </div>

      <!-- 밝기·대비·채도 -->
      <div class="ctrl-section">
        <div class="ctrl-label">이미지 보정</div>
        <div class="ctrl-card">
          <div class="slider-row">
            <label>밝기</label>
            <input type="range" id="brightness" min="50" max="150" value="100" step="1">
            <span class="slider-val" id="brightnessVal">100%</span>
          </div>
          <div class="slider-row">
            <label>대비</label>
            <input type="range" id="contrast" min="50" max="150" value="100" step="1">
            <span class="slider-val" id="contrastVal">100%</span>
          </div>
          <div class="slider-row">
            <label>채도</label>
            <input type="range" id="saturation" min="0" max="200" value="100" step="1">
            <span class="slider-val" id="saturationVal">100%</span>
          </div>
        </div>
      </div>

      <!-- 텍스트 -->
      <div class="ctrl-section">
        <div class="ctrl-label">텍스트</div>
        <div class="ctrl-card">
          <div class="text-input-wrap">
            <input type="text" id="watermarkText" placeholder="이미지에 넣을 텍스트를 입력하세요" maxlength="80">
          </div>
          <div class="slider-row">
            <label>크기</label>
            <input type="range" id="wmSize" min="10" max="120" value="24" step="1">
            <span class="slider-val" id="wmSizeVal">24px</span>
          </div>
          <div class="slider-row">
            <label>투명도</label>
            <input type="range" id="wmOpacity" min="5" max="100" value="100" step="5">
            <span class="slider-val" id="wmOpacityVal">100%</span>
          </div>
          <!-- 텍스트 색상 -->
          <div class="ctrl-sub-label">색상</div>
          <div class="bg-color-row" id="wmColorRow">
            <div class="color-swatch active" data-wmcolor="#FFFFFF" style="background:#FFFFFF;border:1px solid #ddd;" title="흰색"></div>
            <div class="color-swatch" data-wmcolor="#000000" style="background:#000000;" title="검정"></div>
            <div class="color-swatch" data-wmcolor="#009CDE" style="background:#009CDE;" title="라로제 블루"></div>
            <div class="color-swatch" data-wmcolor="#C8A49A" style="background:#C8A49A;" title="라로제 로즈"></div>
            <div class="color-swatch" data-wmcolor="#FAF8F5" style="background:#FAF8F5;border:1px solid #ddd;" title="아이보리"></div>
            <div class="color-custom" title="직접 선택">
              🎨<input type="color" id="wmCustomColor" value="#ffffff">
            </div>
          </div>
          <!-- 굵기 -->
          <div class="ctrl-sub-label">굵기</div>
          <div class="scope-row">
            <button class="scope-btn active" id="wmWeightNormal">보통</button>
            <button class="scope-btn" id="wmWeightBold">굵게</button>
          </div>
          <!-- 위치 -->
          <div class="ctrl-sub-label">위치</div>
          <div class="text-pos-row" id="wmPosRow">
            <button class="text-pos-btn" data-wpos="tl">좌상</button>
            <button class="text-pos-btn" data-wpos="tc">상단</button>
            <button class="text-pos-btn" data-wpos="tr">우상</button>
            <button class="text-pos-btn active" data-wpos="br">우하</button>
            <button class="text-pos-btn" data-wpos="bc">하단</button>
            <button class="text-pos-btn" data-wpos="bl">좌하</button>
            <button class="text-pos-btn" data-wpos="mc">중앙</button>
          </div>
        </div>
      </div>

      <!-- 적용 범위 -->
      <div class="ctrl-section">
        <div class="ctrl-label">설정 적용 범위</div>
        <div class="scope-row">
          <button class="scope-btn active" id="scopeCurrent">현재 채널만</button>
          <button class="scope-btn" id="scopeAll">전체 채널 일괄</button>
        </div>
      </div>

      <!-- 하단 버튼 (컨트롤 패널 내부) -->
      <div style="display:flex;gap:10px;padding-bottom:calc(var(--safe-bottom) + 4px);">
        <button class="btn-reset" id="sheetReset">초기화</button>
        <button class="btn-confirm" id="sheetConfirm">⬇ 이 설정으로 내보내기</button>
      </div>

    </div><!-- /sheet-controls-pane -->
  </div><!-- /sheet-split -->
</div>

<div class="toast" id="toast"></div>

<script>
// ── 라로제코리아 채널 프리셋 ──────────────────────────
const PRESETS = [
  // 온라인몰
  { id:'ss_main',     name:'스마트스토어 대표이미지',  w:1000, h:1000, ch:'online', icon:'🛒', ratio:'1:1' },

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab[data-tab="' + name + '"]').classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'preview') renderPreviews();
}
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ── 업로드 ────────────────────────────────────────
const uploadZone  = document.getElementById('uploadZone');
const fileInput   = document.getElementById('fileInput');
const previewImg  = document.getElementById('previewImg');
const uploadPreview = document.getElementById('uploadPreview');
const uploadPlaceholder = document.getElementById('uploadPlaceholder');

uploadZone.addEventListener('click', e => { if (e.target !== document.getElementById('removeBtn')) fileInput.click(); });
fileInput.addEventListener('change', e => e.target.files[0] && loadImage(e.target.files[0]));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadImage(e.dataTransfer.files[0]);
});

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      srcImage = img;
      previewImg.src = ev.target.result;
      uploadPreview.style.display = 'block';
      uploadPlaceholder.style.display = 'none';
      uploadZone.classList.add('has-image');
      document.getElementById('previewMeta').textContent =
        `${img.naturalWidth} × ${img.naturalHeight}px · ${(file.size/1024/1024).toFixed(1)}MB`;
      updateActionBar();
      renderPreviews();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('removeBtn').addEventListener('click', e => {
  e.stopPropagation();
  e.preventDefault();
  srcImage = null;
  previewImg.src = '';
  uploadPreview.style.display = 'none';
  uploadPlaceholder.style.display = '';
  uploadZone.classList.remove('has-image');
  // input 초기화 — 같은 파일도 다시 선택 가능하도록
  fileInput.value = '';
  const newInput = fileInput.cloneNode(true);
  fileInput.parentNode.replaceChild(newInput, fileInput);
  newInput.addEventListener('change', e => e.target.files[0] && loadImage(e.target.files[0]));
  updateActionBar();
  // 미리보기 탭도 초기화
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('previewEmpty').style.display = '';
  // 비주얼 탭으로 이동
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab[data-tab="upload"]').classList.add('active');
  document.getElementById('tab-upload').classList.add('active');
});

function filteredPresets() {
  return currentCh === 'all' ? PRESETS : PRESETS.filter(p => p.ch === currentCh);
}

function renderPresets() {
  const list = document.getElementById('presetList');
  list.innerHTML = '';

  // 그룹별 렌더
  const chOrder = currentCh === 'all'
    ? ['web','online','offline','sns','ad']
    : [currentCh];

  chOrder.forEach(ch => {
    const items = PRESETS.filter(p => p.ch === ch);
    if (!items.length) return;

    const group = document.createElement('div');
    group.className = 'ch-group';
    group.innerHTML = `<div class="ch-group-title">${CH_LABELS[ch]}</div><div class="ch-group-items"></div>`;
    const container = group.querySelector('.ch-group-items');

    items.forEach(preset => {
      const item = document.createElement('div');
      item.className = 'preset-item' + (selectedIds.has(preset.id) ? ' selected' : '');
      item.innerHTML = `
        <input type="checkbox" ${selectedIds.has(preset.id) ? 'checked' : ''} data-id="${preset.id}">
        <div class="preset-info">
          <div class="preset-name">${preset.name}</div>
          <div class="preset-dim">${preset.w} × ${preset.h}px${preset.url ? ` · <span style="color:var(--rose-deep)">${preset.url}</span>` : ''}</div>
        </div>
        <span class="preset-ratio">${preset.ratio}</span>
      `;
      item.addEventListener('click', e => {
        if (e.target.type === 'checkbox') return;
        const cb = item.querySelector('input');
        cb.checked = !cb.checked;
        togglePreset(preset.id, cb.checked, item);
      });
      item.querySelector('input').addEventListener('change', function() {
        togglePreset(preset.id, this.checked, item);
      });
      container.appendChild(item);
    });
    list.appendChild(group);
  });
  updateSelCount();
}

function togglePreset(id, checked, el) {
  if (checked) { selectedIds.add(id); el.classList.add('selected'); }
  else { selectedIds.delete(id); el.classList.remove('selected'); }
  updateSelCount();
  updateActionBar();
  renderPreviews();
}

document.getElementById('selAll').addEventListener('click', () => {
  filteredPresets().forEach(p => selectedIds.add(p.id));
  renderPresets(); updateActionBar(); renderPreviews();
});
document.getElementById('deselAll').addEventListener('click', () => {

// ── 이미지 엣지 평균색 추출 ──────────────────────────
function extractEdgeColor(img) {
  const size = 80;
  const tmp = document.createElement('canvas');
  tmp.width = tmp.height = size;
  const ctx = tmp.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);

  // 네 엣지(상/하/좌/우) 픽셀 샘플링
  const data = ctx.getImageData(0, 0, size, size).data;
  let r = 0, g = 0, b = 0, count = 0;

  const sample = (x, y) => {
    const i = (y * size + x) * 4;
    r += data[i]; g += data[i+1]; b += data[i+2]; count++;
  };

  for (let i = 0; i < size; i++) {
    sample(i, 0);           // 상단
    sample(i, size - 1);    // 하단
    sample(0, i);           // 좌측
    sample(size - 1, i);    // 우측
  }

  r = Math.round(r / count);
  g = Math.round(g / count);
  b = Math.round(b / count);
  return `rgb(${r},${g},${b})`;
}

// ── 블러 배경 생성 (엣지색 + 블러로 자연스럽게) ──────
function drawBgBlur(ctx, img, w, h) {
  // 이미지를 배경으로 크게 깔고 블러 처리
  const s = Math.max(w / img.naturalWidth, h / img.naturalHeight);
  const dw = img.naturalWidth * s;
  const dh = img.naturalHeight * s;
  ctx.save();
  ctx.filter = 'blur(40px) brightness(0.85) saturate(1.2)';
  ctx.drawImage(img, (w - dw) / 2, (h - dh) / 2, dw, dh);
  ctx.restore();

  // 살짝 반투명 오버레이로 엣지색 믹스
  const edgeColor = extractEdgeColor(img);
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = edgeColor;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ── 캔버스 드로우 (이미지 보존 + 배경 자동 생성) ──────
function drawImage(canvas, img, w, h, mode) {
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  const iw = img.naturalWidth, ih = img.naturalHeight;

  if (mode === 'stretch') {
    // 늘리기: 그냥 꽉 채움
    ctx.drawImage(img, 0, 0, w, h);
    return;
  }

  // ── 이미지 보존 모드 (contain / cover 모두 이미지 전체 보존) ──
  // 항상 이미지 전체를 표시하되, 남는 여백을 블러 배경으로 채움
  const scale = Math.min(w / iw, h / ih); // 항상 contain 스케일
  const dw = iw * scale;
  const dh = ih * scale;
  const dx = (w - dw) / 2;
  const dy = (h - dh) / 2;

  const hasLetterbox = dw < w || dh < h;

  if (hasLetterbox) {
    // 여백이 생기는 경우 → 블러 배경으로 자연스럽게 채우기
    drawBgBlur(ctx, img, w, h);
  } else {
    // 여백 없음 → 흰 배경
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
  }

  // 이미지 원본을 중앙에 올리기
  ctx.drawImage(img, dx, dy, dw, dh);
}

// ── 미리보기 렌더 ─────────────────────────────────
function renderPreviews() {
  const wrap = document.getElementById('previewGrid');
  const empty = document.getElementById('previewEmpty');
  const selected = PRESETS.filter(p => selectedIds.has(p.id));
  wrap.innerHTML = '';

  if (!srcImage || !selected.length) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';

  // 채널별 그룹으로 렌더
  const chOrder = ['web','online','offline','sns','ad'];
  chOrder.forEach(ch => {
    const group = selected.filter(p => p.ch === ch);
    if (!group.length) return;

    // 채널 섹션 타이틀
    const title = document.createElement('div');
    title.className = 'preview-section-title';
    title.textContent = CH_LABELS[ch];
    wrap.appendChild(title);

    // 그리드
    const grid = document.createElement('div');
    grid.className = 'preview-grid';

    group.forEach(preset => {
      const card = document.createElement('div');
      card.className = 'pv-card';

      // 캔버스 - 체커보드 배경으로 투명 영역 표시
      const MAX = 160;
      const s = Math.min(MAX / preset.w, MAX / preset.h, 1);
      const pw = Math.round(preset.w * s);
      const ph = Math.round(preset.h * s);
      const canvas = document.createElement('canvas');
      drawImage(canvas, srcImage, pw, ph, cropMode);

      card.innerHTML = `
        <div class="pv-canvas-wrap"></div>
        <div class="pv-body">
          <div class="pv-ch">${CH_LABELS[preset.ch]}</div>
          <div class="pv-name">${preset.name}</div>
          <div class="pv-dim">${preset.w} × ${preset.h}px</div>
          <button class="pv-dl">⬇ 개별 저장</button>
        </div>
      `;
      card.querySelector('.pv-canvas-wrap').appendChild(canvas);
      card.querySelector('.pv-dl').addEventListener('click', () => downloadOne(preset));
      grid.appendChild(card);
    });

    wrap.appendChild(grid);
  });
}

// ── 다운로드 ──────────────────────────────────────
const MIME = { jpeg:'image/jpeg', png:'image/png', webp:'image/webp', pop_a3:'image/jpeg' };
const EXT  = { jpeg:'jpg', png:'png', webp:'webp', pop_a3:'jpg' };

function downloadOne(preset) {
  const canvas = document.createElement('canvas');
  drawImage(canvas, srcImage, preset.w, preset.h, cropMode);
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `larosee_kv_${preset.id}_${preset.w}x${preset.h}.${EXT[outputFormat]}`;
    a.click(); URL.revokeObjectURL(a.href);
    showToast(`${preset.name} 저장 완료`);
  }, MIME[outputFormat], 0.92);
}

let sheetPresets = [];
let sheetIdx = 0;
let scopeAll = false;

function openSheet() {
  sheetPresets = PRESETS.filter(p => selectedIds.has(p.id));
  if (!sheetPresets.length || !srcImage) return;
  sheetIdx = 0;
  scopeAll = false;
  document.getElementById('scopeCurrent').classList.add('active');
  document.getElementById('scopeAll').classList.remove('active');
  loadSheetPreset(sheetIdx);
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('customSheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('customSheet').classList.remove('open');
  document.body.style.overflow = '';
}

function loadSheetPreset(idx) {
  const preset = sheetPresets[idx];
  const s = getSettings(preset.id);

  // 네비 업데이트
  document.getElementById('customPresetName').textContent = preset.name;
  document.getElementById('customPresetDim').textContent = preset.w + ' × ' + preset.h + 'px';
  document.getElementById('navCounter').textContent = (idx+1) + ' / ' + sheetPresets.length;

  // 컨트롤 값 복원
  document.getElementById('brightness').value = s.brightness;
  document.getElementById('brightnessVal').textContent = s.brightness + '%';
  document.getElementById('contrast').value = s.contrast;
  document.getElementById('contrastVal').textContent = s.contrast + '%';
  document.getElementById('saturation').value = s.saturation;
  document.getElementById('saturationVal').textContent = s.saturation + '%';
  document.getElementById('watermarkText').value = s.wmText;
  document.getElementById('wmSize').value = s.wmSize;
  document.getElementById('wmSizeVal').textContent = s.wmSize + 'px';
  document.getElementById('wmOpacity').value = s.wmOpacity;
  document.getElementById('wmOpacityVal').textContent = s.wmOpacity + '%';

  // 위치 버튼
  document.querySelectorAll('.pos-btn').forEach(b => {
    const bh = b.dataset.pos.charAt(1) === 'l' ? 'ml' : b.dataset.pos.charAt(1) === 'r' ? 'mr' : 'mc';
    const bv = b.dataset.pos.charAt(0) === 't' ? 'tc' : b.dataset.pos.charAt(0) === 'b' ? 'bc' : 'mc';
    const ph = s.posH === 'ml' ? 'l' : s.posH === 'mr' ? 'r' : 'c';
    const pv = s.posV === 'tc' ? 't' : s.posV === 'bc' ? 'b' : 'm';
    const match = b.dataset.pos === pv + ph;
    b.classList.toggle('active', match);
  });

  // 배경색 스와치
  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.classList.toggle('active', sw.dataset.color === s.bgColor);
  });

  // 워터마크 위치
  document.querySelectorAll('[data-wpos]').forEach(b => {
    b.classList.toggle('active', b.dataset.wpos === s.wmPos);
  });

  // 텍스트 색상
  document.querySelectorAll('[data-wmcolor]').forEach(sw => {
    sw.classList.toggle('active', sw.dataset.wmcolor === s.wmColor);
  });

  // 텍스트 굵기
  document.getElementById('wmWeightNormal').classList.toggle('active', !s.wmBold);
  document.getElementById('wmWeightBold').classList.toggle('active', s.wmBold);

  updateSheetPreview();
}

function currentPreset() { return sheetPresets[sheetIdx]; }
function currentSettings() { return getSettings(currentPreset().id); }

function applyToScope(key, val) {
  if (scopeAll) {
    sheetPresets.forEach(p => { getSettings(p.id)[key] = val; });
  } else {
    currentSettings()[key] = val;
  }
  updateSheetPreview();
}

// ── 실시간 미리보기 ───────────────────────────────────
function updateSheetPreview() {
  const preset = currentPreset();
  const s = currentSettings();
  const MAX = 280;
  const scale = Math.min(MAX / preset.w, MAX / preset.h, 1);
  const pw = Math.round(preset.w * scale);
  const ph = Math.round(preset.h * scale);
  const canvas = document.getElementById('customCanvas');
  drawImageCustom(canvas, srcImage, pw, ph, s);
}

function drawImageCustom(canvas, img, w, h, s) {
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // 배경
  if (s.bgColor === 'auto') {
    drawBgBlur(ctx, img, w, h);
  } else {
    ctx.fillStyle = s.bgColor;
    ctx.fillRect(0, 0, w, h);
  }

  // 이미지 크기 (contain)
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const baseScale = Math.min(w / iw, h / ih);
  const dw = iw * baseScale;
  const dh = ih * baseScale;

  // 위치 (posH: ml/mc/mr, posV: tc/mc/bc)
  const px = s.posH === 'ml' ? 0 : s.posH === 'mr' ? w - dw : (w - dw) / 2;
  const py = s.posV === 'tc' ? 0 : s.posV === 'bc' ? h - dh : (h - dh) / 2;

  // 필터 적용
  ctx.save();
  ctx.filter = `brightness(${s.brightness}%) contrast(${s.contrast}%) saturate(${s.saturation}%)`;
  ctx.drawImage(img, px, py, dw, dh);
  ctx.restore();

  // 텍스트
  if (s.wmText) {
    const fontSize = Math.max(8, Math.round(s.wmSize * (w / 400)));
    const weight = s.wmBold ? '700' : '400';
    ctx.save();
    ctx.globalAlpha = s.wmOpacity / 100;
    ctx.font = `${weight} ${fontSize}px 'SUIT', 'Apple SD Gothic Neo', sans-serif`;
    ctx.fillStyle = s.wmColor || '#FFFFFF';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = Math.max(2, fontSize * 0.15);
    const tw = ctx.measureText(s.wmText).width;
    const pad = fontSize * 0.8;
    let tx, ty;
    switch(s.wmPos) {
      case 'tl': tx = pad; ty = fontSize + pad; break;
      case 'tc': tx = (w - tw) / 2; ty = fontSize + pad; break;
      case 'tr': tx = w - tw - pad; ty = fontSize + pad; break;
      case 'bl': tx = pad; ty = h - pad; break;
      case 'bc': tx = (w - tw) / 2; ty = h - pad; break;
      case 'mc': tx = (w - tw) / 2; ty = (h + fontSize) / 2; break;
      case 'br': default: tx = w - tw - pad; ty = h - pad; break;
    }
    ctx.fillText(s.wmText, tx, ty);
    ctx.restore();
  }
}

// ── 컨트롤 이벤트 ────────────────────────────────────
// 위치 버튼
document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const pos = btn.dataset.pos;
    const pH = pos[1] === 'l' ? 'ml' : pos[1] === 'r' ? 'mr' : 'mc';
    const pV = pos[0] === 't' ? 'tc' : pos[0] === 'b' ? 'bc' : 'mc';
    document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (scopeAll) { sheetPresets.forEach(p => { getSettings(p.id).posH = pH; getSettings(p.id).posV = pV; }); }
    else { currentSettings().posH = pH; currentSettings().posV = pV; }
    updateSheetPreview();
  });
});

// 슬라이더들
const sliders = [
  { id:'brightness', key:'brightness', valId:'brightnessVal', suffix:'%' },
  { id:'contrast',   key:'contrast',   valId:'contrastVal',   suffix:'%' },
  { id:'saturation', key:'saturation', valId:'saturationVal', suffix:'%' },
  { id:'wmSize',     key:'wmSize',     valId:'wmSizeVal',     suffix:'px' },
  { id:'wmOpacity',  key:'wmOpacity',  valId:'wmOpacityVal',  suffix:'%' },
];
sliders.forEach(({ id, key, valId, suffix }) => {
  document.getElementById(id).addEventListener('input', function() {
    document.getElementById(valId).textContent = this.value + suffix;
    applyToScope(key, Number(this.value));
  });
});

// 배경색
document.querySelectorAll('.color-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
    sw.classList.add('active');
    applyToScope('bgColor', sw.dataset.color);
  });
});
document.getElementById('customBgColor').addEventListener('input', function() {
  document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
  applyToScope('bgColor', this.value);
});

// 워터마크
document.getElementById('watermarkText').addEventListener('input', function() {
  applyToScope('wmText', this.value);
});
document.querySelectorAll('[data-wpos]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-wpos]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyToScope('wmPos', btn.dataset.wpos);
  });
});

// 텍스트 색상 스와치
document.querySelectorAll('[data-wmcolor]').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('[data-wmcolor]').forEach(x => x.classList.remove('active'));
    sw.classList.add('active');
    applyToScope('wmColor', sw.dataset.wmcolor);
  });
});
document.getElementById('wmCustomColor').addEventListener('input', function() {
  document.querySelectorAll('[data-wmcolor]').forEach(x => x.classList.remove('active'));
  applyToScope('wmColor', this.value);
});

// 텍스트 굵기
document.getElementById('wmWeightNormal').addEventListener('click', () => {
  document.getElementById('wmWeightNormal').classList.add('active');
  document.getElementById('wmWeightBold').classList.remove('active');
  applyToScope('wmBold', false);
});
document.getElementById('wmWeightBold').addEventListener('click', () => {
  document.getElementById('wmWeightBold').classList.add('active');
  document.getElementById('wmWeightNormal').classList.remove('active');
  applyToScope('wmBold', true);
});

// 채널 네비
document.getElementById('navPrev').addEventListener('click', () => {
  sheetIdx = (sheetIdx - 1 + sheetPresets.length) % sheetPresets.length;
  loadSheetPreset(sheetIdx);
});
document.getElementById('navNext').addEventListener('click', () => {
  sheetIdx = (sheetIdx + 1) % sheetPresets.length;
  loadSheetPreset(sheetIdx);
});

// 적용 범위 토글
document.getElementById('scopeCurrent').addEventListener('click', () => {
  scopeAll = false;
  document.getElementById('scopeCurrent').classList.add('active');
  document.getElementById('scopeAll').classList.remove('active');
});
document.getElementById('scopeAll').addEventListener('click', () => {
  scopeAll = true;
  document.getElementById('scopeAll').classList.add('active');
  document.getElementById('scopeCurrent').classList.remove('active');
});

// 초기화
document.getElementById('sheetReset').addEventListener('click', () => {
  const ids = scopeAll ? sheetPresets.map(p => p.id) : [currentPreset().id];
  ids.forEach(id => { customSettings[id] = defaultSettings(); });
  loadSheetPreset(sheetIdx);
});

// 닫기
document.getElementById('sheetClose').addEventListener('click', closeSheet);
document.getElementById('sheetOverlay').addEventListener('click', closeSheet);

// 내보내기 확정
document.getElementById('sheetConfirm').addEventListener('click', async () => {
  closeSheet();
  const selected = sheetPresets;
  const btn = document.getElementById('exportBtn');
  btn.textContent = '내보내는 중...';
  btn.disabled = true;

  for (const p of selected) {
    const s = getSettings(p.id);
    await new Promise(resolve => {
      const canvas = document.createElement('canvas');
      drawImageCustom(canvas, srcImage, p.w, p.h, s);
      canvas.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `larosee_kv_${p.id}_${p.w}x${p.h}.${EXT[outputFormat]}`;
        a.click(); URL.revokeObjectURL(a.href);
        setTimeout(resolve, 150);
      }, MIME[outputFormat], 0.92);
    });
  }
  btn.textContent = '⬇ 내보내기';
  btn.disabled = false;
  showToast(selected.length + '개 파일 내보내기 완료');
});

// ── 내보내기 버튼 → 시트 열기 ─────────────────────────
document.getElementById('exportBtn').addEventListener('click', () => {
  openSheet();
});

// ── 토스트 ────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── 초기화 ────────────────────────────────────────
renderPresets();
</script>
